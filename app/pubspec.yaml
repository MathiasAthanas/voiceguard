name: voiceguard
description: Voice identity verification app with VoIP and cellular call support
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # WebRTC for VoIP calls
  flutter_webrtc: ^1.4.1

  # Permissions handling
  permission_handler: ^11.0.1

  # Audio recording (speakerphone monitor mode)
  record: ^6.2.0

  # HTTP client for AI backend
  dio: ^5.3.3

  # Local storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1

  # State management
  provider: ^6.1.1

  # UUID generation
  uuid: ^4.1.0

  # Icons
  cupertino_icons: ^1.0.2

  # Streaming PCM playback for server-relayed VoIP audio
  flutter_sound: ^9.2.13

  # Audio waveform visualization
  audio_waveforms: ^1.0.5

  # Charts — confidence score history in in-call screen
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/icons/
